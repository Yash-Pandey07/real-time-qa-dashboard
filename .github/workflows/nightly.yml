name: Nightly Regression

on:
  schedule:
    # Mon / Wed / Fri at 20:30 UTC = Tue / Thu / Sat 02:00 AM IST
    - cron: '30 20 * * 1,3,5'
  workflow_dispatch: # manual trigger for ad-hoc runs

jobs:
  # ── Backend unit + API tests ──────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax check
        working-directory: backend
        run: |
          node --check server.js
          node --check config.js
          node --check routes/api.js
          node --check services/poller.js
          node --check services/cache.js
          node --check services/bottleneck.js
          node --check adapters/github.js
          node --check adapters/jira.js
          node --check adapters/selfhealing.js

      - name: Run all tests
        working-directory: backend
        run: npm test -- --forceExit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_BASE_URL: https://issues.apache.org/jira

  # ── Frontend component tests + build check ────────────────────────────────────
  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run component tests
        working-directory: frontend
        run: npm test
        env:
          VITE_API_URL: https://placeholder.railway.app
          VITE_WS_URL: wss://placeholder.railway.app/ws

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://placeholder.railway.app' }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL  || 'wss://placeholder.railway.app/ws' }}

  # ── Playwright smoke / E2E tests ──────────────────────────────────────────────
  smoke:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]   # run after basic tests pass
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright deps
        working-directory: e2e
        run: npm ci

      - name: Install Chromium browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: e2e
        run: npm test
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: e2e/test-results/
          retention-days: 7
